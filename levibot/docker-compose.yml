version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: levibot_db
    restart: always
    environment:
      POSTGRES_USER: mimar
      POSTGRES_PASSWORD: thurisaz_password
      POSTGRES_DB: levibot_v1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: levibot_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mimar:thurisaz_password@db:5432/levibot_v1

volumes:
  postgres_data:
